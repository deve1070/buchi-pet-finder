version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: buchi_db
    environment:
      POSTGRES_DB: buchi_db
      POSTGRES_USER: buchi_user
      POSTGRES_PASSWORD: buchi_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buchi_user -d buchi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data: