version: "3.9"

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: buchi_db
    environment:
      POSTGRES_DB: buchi_db
      POSTGRES_USER: buchi_user
      POSTGRES_PASSWORD: buchi_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buchi_user -d buchi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Spring Boot Application ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buchi_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: buchi_db
      DB_USER: buchi_user
      DB_PASSWORD: buchi_pass

      # Petfinder API credentials (set in .env file)
      PETFINDER_API_KEY: ${PETFINDER_API_KEY:-placeholder}
      PETFINDER_API_SECRET: ${PETFINDER_API_SECRET:-placeholder}

      # The Dog API key (set in .env file)
      DOGAPI_KEY: ${DOGAPI_KEY:-}

      # Public base URL for photo links
      BASE_URL: ${BASE_URL:-http://localhost:8080}

      # Upload directory inside container
      UPLOAD_DIR: /app/uploads/photos
    ports:
      - "8080:8080"
    volumes:
      - photo_uploads:/app/uploads/photos
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  photo_uploads:
    driver: local
