# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:buchi_db}
spring.datasource.username=${DB_USER:buchi_user}
spring.datasource.password=${DB_PASSWORD:buchi_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# App config
app.photo.upload-dir=${UPLOAD_DIR:uploads/photos}
app.photo.base-url=${BASE_URL:http://localhost:8080}

# Petfinder API
petfinder.api.base-url=https://api.petfinder.com/v2
petfinder.api.key=${PETFINDER_API_KEY:placeholder}
petfinder.api.secret=${PETFINDER_API_SECRET:placeholder}

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html