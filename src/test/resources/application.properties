# Test DB - H2 in-memory (no real PostgreSQL needed for tests)
spring.datasource.url=jdbc:h2:mem:buchi_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Flyway for tests (JPA creates schema from entities)
spring.flyway.enabled=false

# Petfinder - placeholder for tests
petfinder.api.base-url=http://localhost:9999
petfinder.api.key=test_key
petfinder.api.secret=test_secret

# Photo storage
app.photo.upload-dir=target/test-uploads
app.photo.base-url=http://localhost:8080